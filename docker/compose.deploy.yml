# docker/compose.deploy.yml
services:

  minio-server:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: "minio-server"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_NAME}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data
    networks:
      - pose-estimation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_INTERNAL_PORT}/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-server:
    image: docker.io/library/postgres:18-alpine
    container_name: "postgres-server"
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_SYSTEM_DB_NAME}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME}
      POSTGRES_USER_PASSWORD: ${POSTGRES_USER_PASSWORD}
      POSTGRES_USER_DB_NAME: ${POSTGRES_USER_DB_NAME}
    volumes:
      - ./postgres/init/01-create-user.sql:/docker-entrypoint-initdb.d/01-create-user.sql:ro
    networks:
      - pose-estimation
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_SUPERUSER_NAME}", "-d", "${POSTGRES_SYSTEM_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-server:
    image: docker.io/library/redis:8-alpine
    container_name: "redis-server"
    environment:
      REDIS_ADMIN_NAME: ${REDIS_ADMIN_NAME}
      REDIS_ADMIN_PASSWORD: ${REDIS_ADMIN_PASSWORD}
      REDIS_USER_NAME: ${REDIS_USER_NAME}
      REDIS_USER_PASSWORD: ${REDIS_USER_PASSWORD}
    volumes:
      - ./redis/init/01-create-users.acl:/usr/local/etc/redis/01-create-users.acl:ro
    command: redis-server --aclfile /usr/local/etc/redis/01-create-users.acl
    networks:
      - pose-estimation
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "${REDIS_ADMIN_NAME}", "--pass", "${REDIS_ADMIN_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: "minio-init"
    depends_on:
      minio-server:
        condition: service_healthy
    volumes:
      - ./minio/init/setup.sh:/init/setup.sh:ro
      - ./minio/init/policy.json:/init/policy.json:ro
    networks:
      - pose-estimation
    entrypoint: ["/bin/sh", "/init/setup.sh"]
    restart: "no"

  migrate-db:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: "migrate-db"
    env_file: ../.env
    command: ["pixi", "run", "-e", "server", "alembic", "-c", "./migrations/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres-server:
        condition: service_healthy
    restart: "no"
    networks:
      - pose-estimation

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: "server"
    env_file: ../.env
    ports:
      - "${SERVER_EXTERNAL_PORT}:${SERVER_INTERNAL_PORT}"
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
      minio-server:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate-db:
        condition: service_completed_successfully
    networks:
      - pose-estimation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_INTERNAL_PORT}/health/shallow/"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-default:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker-default
    container_name: "worker-default"
    env_file: ../.env
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
      minio-server:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate-db:
        condition: service_completed_successfully
    networks:
      - pose-estimation

  worker-inference:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker-inference
    container_name: "worker-inference"
    env_file: ../.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres-server:
        condition: service_healthy
      redis-server:
        condition: service_healthy
      minio-server:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate-db:
        condition: service_completed_successfully
    networks:
      - pose-estimation
    volumes:
      - ../${WORKER_INFERENCE_MODEL_PATH}:/appdir/${WORKER_INFERENCE_MODEL_PATH}:ro

networks:
  pose-estimation:
    driver: bridge